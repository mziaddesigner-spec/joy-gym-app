<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إصدار هويات Joy Gym</title>
    <style>
        :root { --main-color: #f7b500; --dark-color: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .container { max-width: 500px; background: white; padding: 20px; margin: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--main-color); color: var(--dark-color); font-weight: bold; cursor: pointer; border: none; }
        
        /* تصميم الهوية التي ستظهر بعد النجاح */
        #id-card-result { display: none; margin-top: 30px; border: 2px solid var(--dark-color); border-radius: 15px; overflow: hidden; background: white; position: relative; width: 350px; margin-left: auto; margin-right: auto; }
        .card-header { background: var(--dark-color); color: var(--main-color); padding: 15px; font-size: 20px; font-weight: bold; }
        .card-body { padding: 20px; text-align: right; }
        .user-img { width: 120px; height: 120px; border-radius: 10px; object-fit: cover; border: 3px solid var(--main-color); float: left; }
        .qr-img { width: 80px; height: 80px; margin-top: 10px; }
        .info { margin-top: 10px; font-size: 16px; }
        .info b { color: #555; }
        #display-image {
    width: 100px;
    height: 100px;
    object-fit: cover; /* لضمان عدم تمدد الصورة بشكل سيء */
    display: block;
}

#display-qr {
    width: 70px;
    height: 70px;
    display: block;
}
    </style>
</head>
<body>

<div class="container">
    <h2>تسجيل عضوية جديدة</h2>
    <input type="text" id="userName" placeholder="اكتب اسم المشترك هنا...">
    <input type="file" id="userImage" accept="image/*">
    <button id="submitBtn">إصدار الهوية الآن</button>
</div>

<div id="id-card-result">
    <div class="card-header">JOY GYM - بطاقة عضوية</div>
    <div class="card-body">
        <img id="display-image" class="user-img" src="" alt="صورة المشترك">
        <div class="info"><b>الاسم:</b> <span id="display-name"></span></div>
        <div class="info"><b>المعرف:</b> #<span id="display-id"></span></div>
        <div class="info"><b>التاريخ:</b> <span id="display-date"></span></div>
        <img id="display-qr" class="qr-img" src="" alt="رمز QR">
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwh99D0sTjrH_vGyg1v5qgXXC8MyJJxSoRBiiX-Z0rX9oG-totGMMnNdz7o3zojDcctrw/exec';

    document.getElementById('submitBtn').addEventListener('click', function() {
        const name = document.getElementById('userName').value;
        const fileInput = document.getElementById('userImage');
        
        if (!name || fileInput.files.length === 0) {
            alert("يرجى إدخال الاسم واختيار الصورة!");
            return;
        }

        this.innerText = "جاري الإصدار...";
        this.disabled = true;

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Image = e.target.result;
            
            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ name: name, image: base64Image })
            })
            .then(res => res.json())
            .then(result => {
                if (result.result === "success") {
                    // تعبئة بيانات الهوية
                    document.getElementById('display-name').innerText = result.name;
                    document.getElementById('display-id').innerText = result.id;
                    document.getElementById('display-date').innerText = result.date;
                    // تحويل رابط درايف إلى رابط عرض مباشر
let directUrl = result.imageUrl.replace('/view?usp=drivesdk', '').replace('file/d/', 'uc?export=view&id=');
document.getElementById('display-image').src = directUrl;
document.getElementById('display-qr').src = result.qrUrl;

                    // إظهار الهوية
                    document.getElementById('id-card-result').style.display = 'block';
                    document.getElementById('submitBtn').innerText = "تم بنجاح!";
                } else {
                    alert("خطأ: " + result.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert("حدث خطأ في الاتصال");
            });
        };
        reader.readAsDataURL(fileInput.files[0]);
    });
</script>

</body>
</html>
